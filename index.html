<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Access Hub</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0a0a0a, #1a1a1a);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    text-align: center;
    width: 90%;
    max-width: 400px;
}

h1 {
    font-size: 20px;
    margin-bottom: 30px;
    opacity: 0.8;
}

.card {
    display: block;
    background: #111;
    padding: 20px;
    margin: 15px 0;
    border-radius: 15px;
    text-decoration: none;
    color: white;
    transition: 0.3s;
    border: 1px solid #222;
}

.card:hover {
    transform: scale(1.05);
    box-shadow: 0 0 15px rgba(255,255,255,0.1);
}

.title {
    font-size: 18px;
    font-weight: bold;
}

.subtitle {
    font-size: 13px;
    opacity: 0.7;
    margin-top: 5px;
}
</style>
</head>

<body>

<div class="container">
    <h1>Choose Your Experience</h1>

    <a href="#" class="card" onclick="openExternal('https://candylink69.vercel.app')">
        <div class="title">Watch Full Movies & Videos</div>
        <div class="subtitle">Online streaming with subtitles, no download required</div>
    </a>

    <a href="#" class="card" onclick="openExternal('https://antarvasana69.vercel.app')">
        <div class="title">Exclusive Hindi Stories</div>
        <div class="subtitle">Read unique and engaging stories anytime</div>
    </a>
</div>

<script>
function isInstagram() {
    const ua = navigator.userAgent || "";
    return ua.includes("Instagram") || ua.includes("FBAN") || ua.includes("FBAV");
}

function openExternal(url) {
    if (isInstagram()) {
        // Force external browser popup
        const a = document.createElement("a");
        a.href = url;
        a.target = "_blank";
        a.rel = "noopener noreferrer";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);

        // Backup redirect (sometimes needed)
        setTimeout(() => {
            window.location.href = url;
        }, 1500);

    } else {
        window.location.href = url;
    }
}
</script>

</body>
</html>
