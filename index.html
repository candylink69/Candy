<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Access Hub</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0a0a0a, #1a1a1a);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    text-align: center;
    width: 90%;
    max-width: 400px;
}

h1 {
    font-size: 20px;
    margin-bottom: 30px;
    opacity: 0.85;
}

.card {
    display: block;
    background: #111;
    padding: 20px;
    margin: 15px 0;
    border-radius: 15px;
    text-decoration: none;
    color: white;
    transition: 0.3s;
    border: 1px solid #222;
}

.card:hover {
    transform: scale(1.05);
    box-shadow: 0 0 15px rgba(255,255,255,0.1);
}

.title {
    font-size: 18px;
    font-weight: bold;
}

.subtitle {
    font-size: 13px;
    opacity: 0.7;
    margin-top: 5px;
}
</style>
</head>

<body>

<div class="container">
    <h1>Tap to Continue</h1>

    <div class="card" onclick="goToPage('zang.html'); return false;">
        <div class="title">Watch Full Movies & Videos</div>
        <div class="subtitle">Online streaming with subtitles, no download required</div>
    </div>

    <div class="card" onclick="goToPage('zing.html'); return false;">
        <div class="title">Exclusive Hindi Stories</div>
        <div class="subtitle">Read unique and engaging stories anytime</div>
    </div>
</div>

<script>
// ========== INSTAGRAM BROWSER DETECTION ==========
function isInstagramBrowser() {
    const ua = navigator.userAgent || navigator.vendor || window.opera;
    return ua.includes('Instagram') || 
           ua.includes('FBAV') || 
           ua.includes('FBAN') || 
           (window.top !== window.self && document.referrer.includes('instagram'));
}

// ========== INTERNAL NAVIGATION HANDLER ==========
function goToPage(url) {
    // Yaha external force nahi karna
    // Sirf clean internal navigation
    window.location.href = url;
}
</script>

</body>
</html>
