<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Stream & Stories</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a0a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      padding: 1.5rem;
    }

    .card {
      background: rgba(15, 15, 18, 0.95);
      backdrop-filter: blur(2px);
      border-radius: 2rem;
      padding: 2rem 1.8rem;
      max-width: 500px;
      width: 100%;
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.7);
      transition: all 0.2s ease;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(135deg, #ffffff 0%, #e0e0e0 100%);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      margin-bottom: 0.5rem;
      letter-spacing: -0.3px;
    }

    .sub {
      font-size: 0.85rem;
      color: #9ca3af;
      margin-bottom: 2rem;
      border-left: 2px solid #ff1e56;
      padding-left: 0.75rem;
    }

    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
      margin-bottom: 1.8rem;
    }

    .btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 1.25rem 1rem;
      border-radius: 1.5rem;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.25s ease;
      cursor: pointer;
      width: 100%;
      border: none;
      background: #1a1a1f;
      color: white;
    }

    .btn-primary {
      background: linear-gradient(95deg, #e61e4d, #ff1e56);
      box-shadow: 0 10px 20px -5px rgba(230, 30, 77, 0.3);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      filter: brightness(1.05);
      box-shadow: 0 18px 28px -8px rgba(230, 30, 77, 0.4);
    }

    .btn-secondary {
      background: #202026;
      border: 1px solid #2c2c34;
    }

    .btn-secondary:hover {
      background: #2a2a32;
      transform: translateY(-1px);
    }

    .btn-title {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 0.3rem;
      letter-spacing: -0.2px;
    }

    .btn-desc {
      font-size: 0.75rem;
      opacity: 0.85;
      font-weight: normal;
    }

    .info-note {
      background: rgba(255, 200, 50, 0.08);
      border-left: 3px solid #ffb347;
      padding: 0.8rem 1rem;
      border-radius: 1rem;
      font-size: 0.75rem;
      color: #cbd5e1;
      text-align: left;
      margin-top: 0.5rem;
    }

    .info-note strong {
      color: #ffb347;
    }

    .footer {
      margin-top: 1.5rem;
      font-size: 0.7rem;
      color: #6b7280;
      text-align: center;
    }

    @media (max-width: 480px) {
      .card {
        padding: 1.5rem;
      }
      .btn-title {
        font-size: 1.1rem;
      }
    }
  </style>
</head>
<body>

<div class="card">
  <h1>🎬 Continue</h1>
  <div class="sub">Instant access · External browser only</div>

  <div class="btn-group">
    <!-- Button 1: candylink69.vercel.app -->
    <button id="videoBtn" class="btn btn-primary">
      <span class="btn-title">🎥 Full Video & Movies</span>
      <span class="btn-desc">direct online streaming · watch with subtitles</span>
    </button>

    <!-- Button 2: antarvasana69.vercel.app -->
    <button id="storiesBtn" class="btn btn-secondary">
      <span class="btn-title">📖 Spicy Hindi Stories</span>
      <span class="btn-desc">antarvasana69 · exclusive desi kahaniyaan</span>
    </button>
  </div>

  <div class="info-note">
    <strong>⚡ Instagram / In-App Browser Bypass</strong><br>
    Tap any button — automatically opens in default browser (Chrome/Safari). Will NOT open inside Instagram, Facebook or WebView.
  </div>
  <div class="footer">
    🔓 tap · external redirect · system browser
  </div>
</div>

<script>
// ========== CONFIGURATION ==========
const TARGET_URLS = {
  video: "https://candylink69.vercel.app",
  stories: "https://antarvasana69.vercel.app"
};

// ========== INSTAGRAM BROWSER DETECTION ==========
function isInstagramBrowser() {
    const ua = navigator.userAgent || navigator.vendor || window.opera;
    // Instagram in-app browser detection - clean and reliable
    return ua.includes('Instagram') || 
           ua.includes('FBAV') ||    // Facebook Android
           ua.includes('FBAN') ||    // Facebook app
           (window.top !== window.self && document.referrer.includes('instagram')); // Instagram webview
}

// ========== EXTERNAL BROWSER HANDLER ==========
function openInExternalBrowser(url) {
    if (isInstagramBrowser()) {
        // Trigger Instagram's "Leave Instagram?" prompt
        const externalLink = document.createElement('a');
        externalLink.href = url;
        externalLink.target = '_blank';
        externalLink.rel = 'noopener noreferrer';
        externalLink.style.display = 'none';
        document.body.appendChild(externalLink);
        externalLink.click();
        document.body.removeChild(externalLink);
        
        // Block navigation inside Instagram browser
        throw new Error('Redirect to external browser');
    }
    // Normal navigation for non-Instagram browsers
    window.location.href = url;
}

// ========== ATTACH HANDLERS ==========
const videoBtn = document.getElementById('videoBtn');
const storiesBtn = document.getElementById('storiesBtn');

if (videoBtn) {
  videoBtn.addEventListener('click', function(e) {
    e.preventDefault();
    e.stopPropagation();
    try {
      openInExternalBrowser(TARGET_URLS.video);
    } catch (err) {
      // intentional external redirect
      console.log("Redirecting to external browser");
    }
    return false;
  });
}

if (storiesBtn) {
  storiesBtn.addEventListener('click', function(e) {
    e.preventDefault();
    e.stopPropagation();
    try {
      openInExternalBrowser(TARGET_URLS.stories);
    } catch (err) {
      console.log("Redirecting to external browser");
    }
    return false;
  });
}
</script>
</body>
</html>
