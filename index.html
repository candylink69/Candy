<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Continue</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #0f0f0f;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    .container {
      margin-top: 100px;
      padding: 20px;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 20px;
    }

    p {
      font-size: 14px;
      color: #bbb;
    }

    .btn {
      display: block;
      width: 80%;
      max-width: 300px;
      margin: 15px auto;
      padding: 15px;
      background: #ff0055;
      color: white;
      text-decoration: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: bold;
    }

    .btn:hover {
      background: #ff3366;
    }

    .note {
      margin-top: 30px;
      font-size: 13px;
      color: #888;
    }
  </style>

  <script>
    function openLink(url) {
      // Try forcing external browser
      window.open(url, "_blank");

      // Fallback redirect
      setTimeout(() => {
        window.location.href = url;
      }, 1000);
    }
  </script>

</head>

<body>

  <div class="container">
    <h1>Access Content</h1>
    <p>Click below to continue</p>

    <a href="javascript:void(0)" class="btn" onclick="openLink('https://candylink69.vercel.app')">
      Watch Full Video
    </a>

    <a href="javascript:void(0)" class="btn" onclick="openLink('https://antarvasana69.vercel.app')">
      Hindi Stories
    </a>

    <div class="note">
      If it doesn't open, tap 3 dots (⋮) and select "Open in browser"
    </div>
  </div>

</body>
</html>
